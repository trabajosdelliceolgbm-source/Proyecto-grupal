<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="css/servicios.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h1 class="logo">Galeria</h1>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#111;
      padding:40px;
    }

    h1{
      color:white;
      text-align:center;
      margin-bottom:30px;
    }

    .galeria{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
    }

    .galeria img{
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .galeria img:hover{
      transform:scale(1.03);
      opacity:0.9;
    }

    /* Lightbox */

    .lightbox{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .lightbox img{
      max-width:90%;
      max-height:80%;
      border-radius:10px;
    }

    .cerrar{
      position:absolute;
      top:20px;
      right:30px;
      color:white;
      font-size:40px;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <h1>Galeria after School</h1>
  <br>
  <h3>Aqui hay fotos Sobre el After School</h3>

  <div class="galeria">
    <img src="img/descarga (7).jpg" alt="">
    <img src="img/descarga (8).jpg" alt="">
    <img src="img/jair.jpeg" alt="">
    <img src="img/maxi (2).jpeg" alt="">
    <img src="https://picsum.photos/id/1055/600/400" alt="">
    <img src="https://picsum.photos/id/1065/600/400" alt="">
    <img src="https://picsum.photos/id/1015/600/400" alt="">
    <img src="https://picsum.photos/id/1025/600/400" alt="">
    <img src="https://picsum.photos/id/1035/600/400" alt="">
    <img src="https://picsum.photos/id/1045/600/400" alt="">
    <img src="https://picsum.photos/id/1055/600/400" alt="">
    <img src="https://picsum.photos/id/1065/600/400" alt="">
  </div>

  <div class="lightbox" id="lightbox">
    <span class="cerrar">&times;</span>
    <img id="imagenGrande" src="">
  </div>

  <script>
    const imagenes = document.querySelectorAll('.galeria img');
    const lightbox = document.getElementById('lightbox');
    const imagenGrande = document.getElementById('imagenGrande');
    const cerrar = document.querySelector('.cerrar');

    imagenes.forEach(img => {
      img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        imagenGrande.src = img.src;
      });
    });

    cerrar.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });

    lightbox.addEventListener('click', (e) => {
      if(e.target !== imagenGrande){
        lightbox.style.display = 'none';
      }
    });
  </script>

</body>
</html>
